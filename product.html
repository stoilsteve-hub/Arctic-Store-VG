<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Store - Product</title>
    <!-- load bootstrap and styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Arctic Store</h1>
    </header>
    
    <main class="container my-5">
        <div class="mb-4">
            <a href="js/ProductGrid/viewAllProducts.html" class="text-decoration-none fw-bold" style="color: #2D8CFF;">&larr; Back to Shop</a>
        </div>
        <div class="row">
            <!-- javascript loads product here -->
            <div id="single-product-container" class="col">
                <div class="text-center mt-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="product.js"></script>
</body>
</html>
