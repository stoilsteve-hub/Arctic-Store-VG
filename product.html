<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Store - Product</title>
    <!-- load bootstrap and styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="position-relative">
        <h1>Arctic Store</h1>
        <button class="btn btn-outline-primary position-absolute top-50 end-0 translate-middle-y me-4" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" style="font-family: 'Josefin Sans', sans-serif; font-weight: bold;">
            Cart <span class="badge bg-primary text-light cartBadgeCount ms-1">0</span>
        </button>
    </header>

    <main class="container my-5">
        <div class="mb-4">
            <a href="js/ProductGrid/viewAllProducts.html" class="text-decoration-none fw-bold"
                style="color: #2D8CFF;">&larr; Back to Shop</a>
        </div>
        <div class="row">
            <!-- javascript loads product here -->
            <div id="single-product-container" class="col">
                <div class="text-center mt-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" style="font-family: 'Josefin Sans', sans-serif;">Shopping Cart</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cartItemsContainer" class="flex-grow-1 overflow-auto"></div>
            <div class="mt-3 pt-3 border-top">
                <h5 class="d-flex justify-content-between fw-bold mb-3" style="font-family: 'Josefin Sans', sans-serif;">Total: <span id="cartTotal">0.00€</span></h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-danger w-50 fw-bold" id="clearCartBtn">Clear</button>
                    <button class="btn btn-success w-50 fw-bold" id="checkoutBtn" style="background-color: #2D8CFF; border: none;">Checkout</button>
                </div>
            </div>
        </div>
    </div>
    <div class="popup" id="OrderPopup">
        <div class="popupContent" id="popupBox">
            <form id="orderForm">
                <h1>Billing Form</h1>
                <div id="formError" class="hidden">
                    Please fill out the form correctly
                </div>
                <div class="formGroup">
                    <label for="name">Full name</label>
                    <br>
                    <input type="text" class="formControl inputBase" id="name" placeholder="Enter full name" required>
                    <br>
                    <small class="errorMessage"></small>
                </div>
                <br>
                <div class="formGroup">
                    <label for="email">Email address</label>
                    <br>
                    <input type="text" class="formControl inputBase" id="email" placeholder="Enter email" required>
                    <br>
                    <small class="errorMessage"></small>
                </div>
                <br>
                <div class="formGroup">
                    <label for="phone">Phone number</label>
                    <br>
                    <input type="text" class="formControl inputBase" id="phone" placeholder="Enter phone number" required>
                    <br>
                    <small class="errorMessage"></small>
                </div>
                <br>
                <div class="formGroup">
                    <label for="address">Address</label>
                    <br>
                    <input type="text" class="formControl inputBase" id="address" placeholder="Enter address" required>
                    <br>
                    <small class="errorMessage"></small>
                </div>
                <br>
                <div class="formGroup">
                    <label for="postalnr">Postal number</label>
                    <br>
                    <input type="text" class="formControl inputBase" id="postalnr" placeholder="Enter postal number" required>
                    <br>
                    <small class="errorMessage"></small>
                </div>
                <br>
                <div class="formGroup">
                    <label for="county">County</label>
                    <br>
                    <input type="text" class="formControl inputBase" id="county" placeholder="Enter County" required>
                    <br>
                    <small class="errorMessage"></small>
                </div>
                <br>
                <button type="submit" class="orderButton">Submit</button>
            </form>

            <div id="successMessage" class="hidden">
                <h2>Thank you for your purchase!</h2>
                <p>It is now safe to close</p>
            </div>
            <div>
                <button type="button" id="closeButton">Close</button>
            </div>
        </div>
    </div>

    <!-- scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="orderForm.js"></script>
    <script src="cart.js"></script>
    <script src="product.js"></script>
</body>

</html>
