<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<button class="popupButton"> Show Popup</button>

<div class="popup" id="OrderPopup">
    <form class="popupContent">
        <h1>Billing Form</h1>
        <div class="formGroup">
            <label for="name">Full name</label>
            <br>
            <input type="text" class="formControl" id="name" placeholder="Enter full name" required>
        </div>
        <br>
        <div class="formGroup">
            <label for="email">Email address</label>
            <br>
            <input type="email" class="formControl" id="email" placeholder="Enter email" required>
        </div>
        <br>
        <div class="formGroup">
            <label for="phone">Phone number</label>
            <br>
            <input type="text" class="formControl" id="phone" placeholder="Enter phone number" required>
        </div>
        <br>
        <div class="formGroup">
            <label for="address">Address</label>
            <br>
            <input type="text" class="formControl" id="address" placeholder="Enter address" required>
        </div>
        <br>
        <div class="formGroup">
            <label for="postalnr">Postal number</label>
            <br>
            <input type="text" class="formControl" id="postalnr" placeholder="Enter postal number" required>
        </div>
        <br>
        <div class="formGroup">
            <label for="county">County</label>
            <br>
            <input type="text" class="formControl" id="county" placeholder="Enter County" required>
        </div>
        <br>
        <button type="submit" class="orderButton">Submit</button>
        <button class="closeButton">Close</button>
    </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
