<!DOCTYPE html>
<html lang="en">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="productGridCSS.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Store</title>
</head>

<body>
    <header class="main-header position-relative">
        <h1>Arctic Store</h1>
        <button class="btn btn-outline-primary position-absolute top-50 end-0 translate-middle-y me-4" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" style="font-family: 'Josefin Sans', sans-serif; font-weight: bold; background: white;">
            Cart <span class="badge bg-primary text-light cartBadgeCount ms-1">0</span>
        </button>
    </header>

    <div class="container mt-5">
    <div class="row">
        <div class="col">
            <div id="allCategoryButtons" class="d-flex flex-wrap"></div>
        </div>
    </div>
</div>



    <main>
        <div class="container">
            <div class="row row-cols-2 row-cols-lg-4 g-4" id="productGrid"></div>

        </div>
    </main>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" style="font-family: 'Josefin Sans', sans-serif;">Shopping Cart</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cartItemsContainer" class="flex-grow-1 overflow-auto"></div>
            <div class="mt-3 pt-3 border-top">
                <h5 class="d-flex justify-content-between fw-bold mb-3" style="font-family: 'Josefin Sans', sans-serif;">Total: <span id="cartTotal">0.00€</span></h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-danger w-50 fw-bold" id="clearCartBtn">Clear</button>
                    <a class="btn btn-success w-50 fw-bold d-flex justify-content-center align-items-center" style="background-color: #2D8CFF; border: none; text-decoration: none; color: white;" href="../../product.html">Checkout</a>
                </div>
            </div>
        </div>
    </div>
    <script src="../../cart.js"></script>
    <script src="productGridJS.js"> </script>
</body>

</html>
