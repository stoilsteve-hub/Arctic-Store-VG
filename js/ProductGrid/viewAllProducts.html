<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Store</title>
</head>

<body>
    <header>
        <h1>Arctic Store</h1>
        <!-- At a later stage: perhaps a row of buttons underneath, with all categories
         Would also be nice to lock the header so that it's always visible when scrolling -->
    </header>
    <main>
        <section class="all-products">
            <header>
                <h2>All Products</h2>
            </header>
            <article class="product-card">
                <header>
                    <h3>Fjallraven - Foldsack No. 1</h3>
                </header>
                <img src="https://fakestoreapi.com/img/81fPKd-2AYL._AC_SL1500_t.png" alt="Fjallraven - Foldsack No. 1">
                <p class="price">109.95€</p>
                <!-- link will be added to button at a later stage -->
                <button>
                    Order
                </button>
            </article>

            <article class="product-card">
                <header>
                    <h3>Mens Casual Premium Slim Fit T-Shirts</h3>
                </header>
                <img src="https://fakestoreapi.com/img/71-3HjGNDUL._AC_SY879._SX._UX._SY._UY_t.png"
                    alt="Mens Casual Premium Slim Fit T-Shirts">
                <p class="price">22.3€</p>
                <button>
                    Order
                </button>
            </article>
        </section>
    </main>
</body>
</html>
